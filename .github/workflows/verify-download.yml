name: Verify Download

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false
      - name: Download the specific version
        run: |
          export GOPROXY=direct
          version=v$(cat VERSION)
          go mod download github.com/huaweicloud/huaweicloud-sdk-go-v3@"$version"
          echo "download successfully,  ${version}"
